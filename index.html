<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitDocs</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --ink-2: #555;
    --ink-3: #999;
    --paper: #faf9f7;
    --sidebar-bg: #1c1c1e;
    --sidebar-hover: #2a2a2e;
    --sidebar-active: #3a3a3e;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.15);
    --border: rgba(255,255,255,0.07);
    --border-light: #e8e4de;
    --success: #5cb88a;
    --danger: #e06c6c;
    --radius: 8px;
    --toolbar-h: 48px;
    --sidebar-w: 260px;
  }

  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); overflow: hidden; }

  /* ─── SETUP SCREEN ─────────────────────────────────────── */
  #setup {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; background: var(--sidebar-bg);
  }
  .setup-card {
    background: #242428; border: 1px solid var(--border);
    border-radius: 16px; padding: 48px 52px; width: 480px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  .setup-logo { font-family: 'Lora', serif; font-size: 28px; color: var(--accent); margin-bottom: 6px; }
  .setup-sub { color: var(--ink-3); font-size: 13px; margin-bottom: 36px; }
  .setup-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); margin-bottom: 6px; display: block; }
  .setup-input {
    width: 100%; background: #1a1a1c; border: 1px solid #3a3a3e;
    border-radius: var(--radius); color: #eee; font-family: 'DM Mono', monospace;
    font-size: 13px; padding: 10px 14px; outline: none; transition: border .2s;
    margin-bottom: 20px;
  }
  .setup-input:focus { border-color: var(--accent); }
  .setup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .setup-btn {
    width: 100%; margin-top: 8px; padding: 13px; background: var(--accent);
    color: #1a1a1a; font-weight: 600; font-size: 14px; border: none;
    border-radius: var(--radius); cursor: pointer; transition: opacity .2s;
  }
  .setup-btn:hover { opacity: .85; }
  .setup-help { margin-top: 20px; font-size: 12px; color: var(--ink-3); line-height: 1.7; }
  .setup-help a { color: var(--accent); text-decoration: none; }
  .setup-error { color: var(--danger); font-size: 12px; margin-top: 10px; display: none; }

  /* ─── APP LAYOUT ────────────────────────────────────────── */
  #app { display: none; height: 100vh; }

  .layout { display: flex; height: 100vh; }

  /* ─── SIDEBAR ───────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w); background: var(--sidebar-bg);
    display: flex; flex-direction: column; flex-shrink: 0;
    border-right: 1px solid var(--border);
  }
  .sidebar-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'Lora', serif; font-size: 20px; color: var(--accent); }
  .logo span { color: #888; font-style: italic; font-size: 13px; margin-left: 6px; }
  .icon-btn {
    background: none; border: none; color: #666; cursor: pointer;
    width: 30px; height: 30px; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; transition: background .15s, color .15s;
  }
  .icon-btn:hover { background: var(--sidebar-hover); color: #ccc; }

  .new-doc-btn {
    margin: 12px 12px 8px;
    padding: 9px 14px; background: var(--accent-dim); border: 1px dashed rgba(200,169,110,0.3);
    border-radius: var(--radius); color: var(--accent); font-size: 13px; font-weight: 500;
    cursor: pointer; width: calc(100% - 24px); text-align: left;
    transition: background .15s; display: flex; align-items: center; gap: 8px;
  }
  .new-doc-btn:hover { background: rgba(200,169,110,0.22); }

  .file-list { flex: 1; overflow-y: auto; padding: 4px 8px 16px; }
  .file-list::-webkit-scrollbar { width: 4px; }
  .file-list::-webkit-scrollbar-track { background: transparent; }
  .file-list::-webkit-scrollbar-thumb { background: #3a3a3e; border-radius: 2px; }

  .file-item {
    padding: 9px 10px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background .12s; margin-bottom: 2px; position: relative;
  }
  .file-item:hover { background: var(--sidebar-hover); }
  .file-item.active { background: var(--sidebar-active); }
  .file-icon { font-size: 14px; flex-shrink: 0; }
  .file-name {
    font-size: 13px; color: #ccc; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .file-item.active .file-name { color: #fff; }
  .file-delete {
    opacity: 0; background: none; border: none; color: #e06c6c;
    cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px;
    transition: opacity .15s;
  }
  .file-item:hover .file-delete { opacity: 1; }

  .sidebar-footer {
    border-top: 1px solid var(--border); padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .repo-name { font-family: 'DM Mono', monospace; font-size: 11px; color: #555; }
  .logout-btn {
    font-size: 11px; color: #555; background: none; border: none;
    cursor: pointer; transition: color .15s;
  }
  .logout-btn:hover { color: var(--danger); }

  /* ─── EDITOR AREA ───────────────────────────────────────── */
  .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Toolbar */
  .toolbar {
    height: var(--toolbar-h); background: #fff; border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; padding: 0 20px; gap: 2px; flex-shrink: 0;
  }
  .toolbar-sep { width: 1px; height: 20px; background: var(--border-light); margin: 0 6px; }
  .tb-btn {
    background: none; border: none; cursor: pointer; color: var(--ink-2);
    width: 32px; height: 32px; border-radius: 5px; display: flex;
    align-items: center; justify-content: center; font-size: 14px;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    transition: background .12s, color .12s;
  }
  .tb-btn:hover { background: #f0ece6; color: var(--ink); }
  .tb-btn.active { background: var(--accent-dim); color: var(--accent); }
  .tb-select {
    background: none; border: none; border-radius: 5px; padding: 4px 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink-2);
    cursor: pointer; outline: none; transition: background .12s;
  }
  .tb-select:hover { background: #f0ece6; }

  /* Title bar */
  .title-bar {
    padding: 24px 80px 0; display: flex; align-items: center; gap: 12px;
    background: var(--paper); flex-shrink: 0;
  }
  #doc-title {
    font-family: 'Lora', serif; font-size: 28px; font-weight: 600;
    color: var(--ink); border: none; background: transparent;
    outline: none; flex: 1; border-bottom: 2px solid transparent;
    transition: border-color .2s; padding-bottom: 4px;
  }
  #doc-title:focus { border-bottom-color: var(--accent); }
  #doc-title::placeholder { color: #ccc; }

  .save-btn {
    padding: 8px 20px; background: var(--accent); color: #1a1a1a;
    border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .2s, transform .1s; flex-shrink: 0;
  }
  .save-btn:hover { opacity: .85; }
  .save-btn:active { transform: scale(.97); }
  .save-btn:disabled { opacity: .4; cursor: default; }

  .save-status {
    font-size: 12px; color: var(--ink-3); white-space: nowrap; flex-shrink: 0;
  }
  .save-status.ok { color: var(--success); }
  .save-status.err { color: var(--danger); }

  /* Editor */
  .editor-scroll { flex: 1; overflow-y: auto; padding: 24px 80px 80px; }
  .editor-scroll::-webkit-scrollbar { width: 6px; }
  .editor-scroll::-webkit-scrollbar-track { background: transparent; }
  .editor-scroll::-webkit-scrollbar-thumb { background: #d8d3cc; border-radius: 3px; }

  #editor {
    min-height: 400px; outline: none; line-height: 1.9;
    font-family: 'Lora', serif; font-size: 17px; color: var(--ink);
    caret-color: var(--accent); max-width: 720px;
  }
  #editor h1 { font-size: 26px; margin: 28px 0 10px; line-height: 1.3; }
  #editor h2 { font-size: 21px; margin: 22px 0 8px; line-height: 1.4; }
  #editor h3 { font-size: 18px; margin: 18px 0 6px; }
  #editor p { margin-bottom: 14px; }
  #editor ul, #editor ol { padding-left: 28px; margin-bottom: 14px; }
  #editor li { margin-bottom: 6px; }
  #editor blockquote {
    border-left: 3px solid var(--accent); margin: 20px 0;
    padding: 8px 20px; color: var(--ink-2); font-style: italic;
  }
  #editor a { color: var(--accent); }
  #editor code {
    font-family: 'DM Mono', monospace; font-size: 14px;
    background: #f0ece6; padding: 2px 6px; border-radius: 4px;
  }
  #editor hr { border: none; border-top: 1px solid var(--border-light); margin: 28px 0; }

  /* Placeholder */
  #editor:empty::before {
    content: attr(data-placeholder); color: #ccc; pointer-events: none;
    font-style: italic;
  }

  /* ─── EMPTY STATE ───────────────────────────────────────── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--ink-3); text-align: center; padding: 40px;
  }
  .empty-state .big-icon { font-size: 52px; margin-bottom: 16px; opacity: .4; }
  .empty-state h3 { font-family: 'Lora', serif; font-size: 20px; color: var(--ink-2); margin-bottom: 8px; }
  .empty-state p { font-size: 13px; max-width: 280px; line-height: 1.6; }

  /* ─── LOADING ───────────────────────────────────────────── */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(28,28,30,.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; display: none;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid rgba(200,169,110,.2);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── TOAST ─────────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
    background: #2a2a2e; color: #fff; border-radius: var(--radius);
    font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,.3);
    transform: translateY(80px); opacity: 0; transition: all .3s;
    z-index: 1000; border-left: 3px solid var(--success);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--danger); }
</style>
</head>
<body>

<!-- ─── SETUP ─────────────────────────────────────────────── -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-logo">GitDocs</div>
    <div class="setup-sub">Ton éditeur de texte, tes données sur GitHub.</div>

    <label class="setup-label">Token GitHub personnel</label>
    <input class="setup-input" id="s-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">

    <div class="setup-row">
      <div>
        <label class="setup-label">Nom d'utilisateur GitHub</label>
        <input class="setup-input" id="s-owner" type="text" placeholder="ton-username">
      </div>
      <div>
        <label class="setup-label">Nom du repo privé</label>
        <input class="setup-input" id="s-repo" type="text" placeholder="mes-docs">
      </div>
    </div>

    <button class="setup-btn" onclick="connect()">Se connecter →</button>
    <div class="setup-error" id="setup-error"></div>
    <div class="setup-help">
      1. Crée un <a href="https://github.com/new" target="_blank">repo privé sur GitHub</a><br>
      2. Génère un <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank">token avec scope "repo"</a><br>
      3. Colle les infos ci-dessus — elles restent dans <em>ton</em> navigateur uniquement.
    </div>
  </div>
</div>

<!-- ─── APP ───────────────────────────────────────────────── -->
<div id="app">
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">GitDocs</div>
        <button class="icon-btn" onclick="refreshFiles()" title="Actualiser">↻</button>
      </div>

      <button class="new-doc-btn" onclick="newDoc()">
        <span>＋</span> Nouveau document
      </button>

      <div class="file-list" id="file-list">
        <!-- files injected here -->
      </div>

      <div class="sidebar-footer">
        <span class="repo-name" id="repo-label"></span>
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
      </div>
    </div>

    <!-- Editor or empty state -->
    <div class="editor-area" id="editor-area">
      <div class="empty-state" id="empty-state">
        <div class="big-icon">📄</div>
        <h3>Aucun document ouvert</h3>
        <p>Crée un nouveau document ou sélectionne-en un dans la liste.</p>
      </div>

      <div id="doc-view" style="display:none; flex-direction:column; height:100%;">
        <!-- Toolbar -->
        <div class="toolbar">
          <select class="tb-select" onchange="execCmd('formatBlock', this.value); this.value='p'">
            <option value="p">Paragraphe</option>
            <option value="h1">Titre 1</option>
            <option value="h2">Titre 2</option>
            <option value="h3">Titre 3</option>
            <option value="blockquote">Citation</option>
          </select>

          <div class="toolbar-sep"></div>

          <button class="tb-btn" id="tb-bold" title="Gras" onclick="execCmd('bold')"><b>B</b></button>
          <button class="tb-btn" id="tb-italic" title="Italique" onclick="execCmd('italic')"><i>I</i></button>
          <button class="tb-btn" id="tb-underline" title="Souligner" onclick="execCmd('underline')"><u>U</u></button>
          <button class="tb-btn" id="tb-strike" title="Barré" onclick="execCmd('strikeThrough')"><s>S</s></button>

          <div class="toolbar-sep"></div>

          <button class="tb-btn" title="Liste à puces" onclick="execCmd('insertUnorderedList')">≡</button>
          <button class="tb-btn" title="Liste numérotée" onclick="execCmd('insertOrderedList')">1≡</button>

          <div class="toolbar-sep"></div>

          <button class="tb-btn" title="Aligner à gauche" onclick="execCmd('justifyLeft')">⬛</button>
          <button class="tb-btn" title="Centrer" onclick="execCmd('justifyCenter')">▣</button>

          <div class="toolbar-sep"></div>

          <button class="tb-btn" title="Lien" onclick="insertLink()">🔗</button>
          <button class="tb-btn" title="Ligne horizontale" onclick="execCmd('insertHorizontalRule')">—</button>

          <div style="flex:1"></div>

          <span class="save-status" id="save-status"></span>
          &nbsp;
          <button class="save-btn" id="save-btn" onclick="saveDoc()">Enregistrer</button>
        </div>

        <!-- Title -->
        <div class="title-bar">
          <input id="doc-title" type="text" placeholder="Titre du document..." autocomplete="off">
        </div>

        <!-- Content -->
        <div class="editor-scroll">
          <div id="editor" contenteditable="true" data-placeholder="Commence à écrire…"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ────────────────────────────────────────────────
let cfg = { token: '', owner: '', repo: '' };
let currentFile = null; // { name, sha }
let files = [];
let dirty = false;

const DOCS_PATH = 'docs';

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  const saved = localStorage.getItem('gitdocs_cfg');
  if (saved) {
    cfg = JSON.parse(saved);
    showApp();
  }
});

// ─── SETUP ────────────────────────────────────────────────
async function connect() {
  const token = document.getElementById('s-token').value.trim();
  const owner = document.getElementById('s-owner').value.trim();
  const repo  = document.getElementById('s-repo').value.trim();
  const err   = document.getElementById('setup-error');
  err.style.display = 'none';

  if (!token || !owner || !repo) { showErr('Remplis tous les champs.'); return; }

  showLoading(true);
  try {
    const r = await ghGet(`/repos/${owner}/${repo}`);
    if (!r.ok) {
      const body = await r.json().catch(() => ({}));
      const msg = body.message || `Erreur HTTP ${r.status}`;
      throw new Error(`GitHub: ${msg} (${r.status})`);
    }
    cfg = { token, owner, repo };
    localStorage.setItem('gitdocs_cfg', JSON.stringify(cfg));
    showApp();
  } catch(e) { showErr(e.message); }
  finally { showLoading(false); }

  function showErr(msg) { err.textContent = msg; err.style.display = 'block'; }
}

function logout() {
  if (!confirm('Déconnexion ? (tes docs restent sur GitHub)')) return;
  localStorage.removeItem('gitdocs_cfg');
  currentFile = null; files = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
}

// ─── APP INIT ─────────────────────────────────────────────
async function showApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('repo-label').textContent = `${cfg.owner}/${cfg.repo}`;
  await ensureDocsFolder();
  await refreshFiles();
}

async function ensureDocsFolder() {
  // Try to list docs/ — if 404, create a .gitkeep
  const r = await ghGet(`/repos/${cfg.owner}/${cfg.repo}/contents/${DOCS_PATH}`);
  if (r.status === 404) {
    await ghPut(`/repos/${cfg.owner}/${cfg.repo}/contents/${DOCS_PATH}/.gitkeep`, {
      message: 'Init GitDocs',
      content: btoa('')
    });
  }
}

// ─── FILE LIST ────────────────────────────────────────────
async function refreshFiles() {
  showLoading(true);
  try {
    const r = await ghGet(`/repos/${cfg.owner}/${cfg.repo}/contents/${DOCS_PATH}`);
    const data = await r.json();
    files = Array.isArray(data)
      ? data.filter(f => f.name.endsWith('.html') && f.name !== '.gitkeep')
      : [];
    renderFileList();
  } catch(e) { toast('Erreur de chargement des fichiers', true); }
  finally { showLoading(false); }
}

function renderFileList() {
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  if (files.length === 0) {
    list.innerHTML = '<div style="padding:16px 12px; color:#555; font-size:12px;">Aucun document. Crée-en un !</div>';
    return;
  }
  files.forEach(f => {
    const name = f.name.replace('.html', '');
    const item = document.createElement('div');
    item.className = 'file-item' + (currentFile && currentFile.name === f.name ? ' active' : '');
    item.innerHTML = `
      <span class="file-icon">📄</span>
      <span class="file-name" title="${name}">${name}</span>
      <button class="file-delete" title="Supprimer" onclick="deleteDoc(event, '${f.name}', '${f.sha}')">✕</button>
    `;
    item.addEventListener('click', () => openDoc(f.name));
    list.appendChild(item);
  });
}

// ─── OPEN DOC ─────────────────────────────────────────────
async function openDoc(filename) {
  if (dirty && !confirm('Modifications non sauvegardées. Continuer ?')) return;

  showLoading(true);
  try {
    const r = await ghGet(`/repos/${cfg.owner}/${cfg.repo}/contents/${DOCS_PATH}/${filename}`);
    const data = await r.json();
    const html = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    currentFile = { name: filename, sha: data.sha };

    document.getElementById('doc-title').value = filename.replace('.html', '');
    document.getElementById('editor').innerHTML = html;
    setStatus('');
    setDirty(false);

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('doc-view').style.display = 'flex';
    renderFileList();
    document.getElementById('editor').focus();
  } catch(e) { toast('Impossible d\'ouvrir le fichier', true); }
  finally { showLoading(false); }
}

// ─── NEW DOC ──────────────────────────────────────────────
function newDoc() {
  if (dirty && !confirm('Modifications non sauvegardées. Continuer ?')) return;
  currentFile = null;
  document.getElementById('doc-title').value = '';
  document.getElementById('editor').innerHTML = '';
  setDirty(false);
  setStatus('');
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('doc-view').style.display = 'flex';
  renderFileList();
  document.getElementById('doc-title').focus();
}

// ─── SAVE DOC ─────────────────────────────────────────────
async function saveDoc() {
  const title = document.getElementById('doc-title').value.trim();
  if (!title) { alert('Donne un titre au document !'); return; }

  const content = document.getElementById('editor').innerHTML;
  const filename = slugify(title) + '.html';
  const b64 = btoa(unescape(encodeURIComponent(content)));

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  setStatus('Sauvegarde…');

  try {
    // If renaming, check if old file differs
    if (currentFile && currentFile.name !== filename) {
      // Delete old file first
      await ghDelete(`/repos/${cfg.owner}/${cfg.repo}/contents/${DOCS_PATH}/${currentFile.name}`, {
        message: `Rename: ${currentFile.name} → ${filename}`,
        sha: currentFile.sha
      });
      currentFile = null;
    }

    const body = {
      message: currentFile ? `Update: ${filename}` : `Create: ${filename}`,
      content: b64
    };
    if (currentFile) body.sha = currentFile.sha;

    const r = await ghPut(`/repos/${cfg.owner}/${cfg.repo}/contents/${DOCS_PATH}/${filename}`, body);
    const data = await r.json();

    currentFile = { name: filename, sha: data.content.sha };
    setDirty(false);
    setStatus('✓ Sauvegardé', 'ok');
    toast('Document sauvegardé sur GitHub !');
    await refreshFiles();
  } catch(e) {
    setStatus('Erreur lors de la sauvegarde', 'err');
    toast('Erreur de sauvegarde', true);
  } finally {
    btn.disabled = false;
  }
}

// ─── DELETE DOC ───────────────────────────────────────────
async function deleteDoc(e, filename, sha) {
  e.stopPropagation();
  if (!confirm(`Supprimer "${filename.replace('.html','')}" ? Cette action est irréversible.`)) return;
  showLoading(true);
  try {
    await ghDelete(`/repos/${cfg.owner}/${cfg.repo}/contents/${DOCS_PATH}/${filename}`, {
      message: `Delete: ${filename}`, sha
    });
    if (currentFile && currentFile.name === filename) {
      currentFile = null;
      document.getElementById('doc-view').style.display = 'none';
      document.getElementById('empty-state').style.display = 'flex';
    }
    toast('Document supprimé.');
    await refreshFiles();
  } catch(e) { toast('Erreur de suppression', true); }
  finally { showLoading(false); }
}

// ─── EDITOR ───────────────────────────────────────────────
function execCmd(cmd, val = null) {
  document.getElementById('editor').focus();
  document.execCommand(cmd, false, val);
  updateToolbar();
  setDirty(true);
}

function insertLink() {
  const url = prompt('URL du lien :');
  if (url) execCmd('createLink', url);
}

document.addEventListener('DOMContentLoaded', () => {
  const ed = document.getElementById('editor');
  ed.addEventListener('input', () => setDirty(true));
  ed.addEventListener('keyup', updateToolbar);
  ed.addEventListener('mouseup', updateToolbar);

  // Ctrl+S to save
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      if (document.getElementById('doc-view').style.display !== 'none') saveDoc();
    }
  });

  // Mark dirty on title change
  document.getElementById('doc-title').addEventListener('input', () => setDirty(true));
});

function updateToolbar() {
  ['bold','italic','underline','strikeThrough'].forEach(cmd => {
    const map = { bold:'tb-bold', italic:'tb-italic', underline:'tb-underline', strikeThrough:'tb-strike' };
    const el = document.getElementById(map[cmd]);
    if (el) el.classList.toggle('active', document.queryCommandState(cmd));
  });
}

// ─── HELPERS ──────────────────────────────────────────────
function setDirty(v) {
  dirty = v;
  if (!v) setStatus('');
}

function setStatus(msg, type = '') {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = 'save-status' + (type ? ' ' + type : '');
}

function slugify(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-').trim();
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}

let toastTimer;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── GITHUB API ───────────────────────────────────────────
function ghHeaders() {
  return {
    'Authorization': `token ${cfg.token}`,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github+json'
  };
}

function ghGet(path) {
  return fetch(`https://api.github.com${path}`, { headers: ghHeaders() });
}

function ghPut(path, body) {
  return fetch(`https://api.github.com${path}`, {
    method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body)
  });
}

function ghDelete(path, body) {
  return fetch(`https://api.github.com${path}`, {
    method: 'DELETE', headers: ghHeaders(), body: JSON.stringify(body)
  });
}
